    <title>Cendekia · SIAKAD</title>
    <script>
      // Set theme before paint to avoid flash. Default DARK on first visit;
      // respect the user's saved choice afterwards.
      (function () {
        try {
          const t = localStorage.getItem('siakad-theme');
          const dark = t ? t === 'dark' : true;
          document.documentElement.classList.toggle('dark', dark);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
